<div class="cloud-shell">
  <p-confirmdialog></p-confirmdialog>

  <section class="cloud-headline">
    <div>
      <h1 class="cloud-title text-base sm:text-lg">Cloud Page</h1>
      <p class="cloud-subtitle text-xxs sm:text-xs">
        {{ totalItemsInView }} items in this folder
      </p>
    </div>
    <div class="cloud-headline-actions">
      <p-button
        label="Trash"
        icon="pi pi-trash"
        [outlined]="true"
        styleClass="p-button-sm cloud-accent-btn text-xxs sm:text-xs"
        (click)="goToTrash()"
      ></p-button>
      <p-button
        label="Refresh"
        icon="pi pi-refresh"
        [outlined]="true"
        styleClass="p-button-sm cloud-accent-btn text-xxs sm:text-xs"
        (click)="reloadCurrentFolder()"
      ></p-button>
    </div>
  </section>

  <section class="cloud-toolbar-wrap">
    <p-toolbar styleClass="cloud-toolbar">
      <ng-template pTemplate="start">
        <div class="cloud-toolbar-start">
          <p-button
            label="New"
            icon="pi pi-plus"
            [outlined]="true"
            styleClass="p-button-sm cloud-accent-btn text-xxs sm:text-xs"
            (click)="toggleMenu($event, createMenu)"
          ></p-button>
          <p-menu
            #createMenu
            [popup]="true"
            [appendTo]="'body'"
            [model]="createMenuItems"
          ></p-menu>
          <p-button
            label="Sort"
            icon="pi pi-sort-alt"
            [outlined]="true"
            styleClass="p-button-sm cloud-accent-btn text-xxs sm:text-xs"
            (click)="toggleMenu($event, sortMenu)"
          ></p-button>
          <p-menu
            #sortMenu
            [popup]="true"
            [appendTo]="'body'"
            [model]="sortMenuItems"
          ></p-menu>
          <input
            #fileUploadInput
            type="file"
            class="hidden"
            (change)="onFileSelected($event)"
          />
        </div>
      </ng-template>
      <ng-template pTemplate="end">
        <p-breadcrumb
          [model]="breadcrumbItems"
          [home]="homeBreadcrumb"
          styleClass="cloud-breadcrumb text-xxs sm:text-xs"
        >
          <ng-template pTemplate="item" let-item>
            <a
              class="p-menuitem-link cursor-pointer"
              [class.drag-over]="draggedOverPath === item.id"
              (drop)="onBreadcrumbDrop($event, item.id)"
              (dragover)="onBreadcrumbDragOver($event, item.id)"
              (dragleave)="onDragLeave()"
              (click)="item.command ? item.command() : null"
            >
              <span *ngIf="item.icon" [class]="item.icon"></span>
              <span *ngIf="item.label" class="p-menuitem-text">{{
                item.label
              }}</span>
            </a>
          </ng-template>
        </p-breadcrumb>
      </ng-template>
    </p-toolbar>
  </section>

  <div *ngIf="loading" class="cloud-state text-xxs sm:text-xs">
    <i class="pi pi-spin pi-spinner"></i>
    Loading folder...
  </div>

  <div *ngIf="error" class="cloud-state cloud-state-error text-xxs sm:text-xs">
    <i class="pi pi-exclamation-triangle"></i>
    {{ error }}
  </div>

  <section *ngIf="currentFolder && !loading" class="cloud-table-wrap">
    <p-table
      [value]="entries"
      [lazy]="true"
      [paginator]="totalElements > pageSize"
      [rows]="pageSize"
      [first]="contentFirst"
      [totalRecords]="totalElements"
      (onLazyLoad)="onPageChange($event)"
      styleClass="cloud-table text-xxs sm:text-xs"
      [tableStyle]="{ 'min-width': '100%' }"
    >
      <ng-template pTemplate="header">
        <tr>
          <th>Name</th>
          <th>Size</th>
          <th>Type</th>
          <th class="text-right">Actions</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-entry>
        <tr
          class="cloud-row"
          [class.drag-over]="
            entry.kind === 'folder' && draggedOverPath === entry.path
          "
          (drop)="onDrop($event, entry.kind === 'folder' ? entry.path : null)"
          (dragover)="onDragOver($event, entry.path, entry.kind === 'folder')"
          (dragleave)="onDragLeave()"
        >
          <td>
            <button
              type="button"
              class="cloud-entry-btn"
              draggable="true"
              (dragstart)="
                onDragStart($event, entry.path, entry.kind === 'folder')
              "
              (dragend)="onDragEnd()"
              (click)="
                entry.kind === 'folder'
                  ? navigateToFolder(entry.path)
                  : previewFileByPath(entry.path, entry.name)
              "
            >
              <span
                class="cloud-entry-icon"
                [class.folder]="entry.kind === 'folder'"
              >
                <i
                  class="pi"
                  [class.pi-folder]="entry.kind === 'folder'"
                  [class.pi-file]="entry.kind === 'file'"
                ></i>
              </span>
              <span class="cloud-entry-name">{{ entry.name }}</span>
            </button>
          </td>
          <td class="cloud-muted">{{ entry.sizeLabel }}</td>
          <td class="cloud-muted">{{ entry.typeLabel }}</td>
          <td>
            <div class="cloud-actions">
              <p-button
                *ngIf="entry.kind === 'file'"
                icon="pi pi-download"
                styleClass="p-button-rounded p-button-text p-button-sm cloud-icon-btn"
                [loading]="isDownloading(entry.path)"
                [disabled]="isDownloading(entry.path)"
                (click)="downloadFileByPath(entry.path, entry.name)"
              ></p-button>
              <p-button
                icon="pi pi-pencil"
                styleClass="p-button-rounded p-button-text p-button-sm cloud-icon-btn"
                (click)="
                  entry.kind === 'folder'
                    ? openRenameFolderDialog(entry.path, entry.name)
                    : onEditAction(entry.path, entry.name)
                "
              ></p-button>
              <p-button
                icon="pi pi-trash"
                severity="danger"
                styleClass="p-button-rounded p-button-text p-button-sm cloud-icon-btn"
                (click)="
                  entry.kind === 'folder'
                    ? confirmDeleteFolder(entry.path)
                    : confirmDeleteFile(entry.path)
                "
              ></p-button>
            </div>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="4" class="cloud-empty text-xxs sm:text-xs">
            This folder is empty. Create a new folder or file.
          </td>
        </tr>
      </ng-template>
    </p-table>
  </section>

  <p-dialog
    [(visible)]="showCreateFolderDialog"
    [modal]="true"
    [closable]="true"
    [draggable]="false"
    [resizable]="false"
    header="Create Folder"
    styleClass="cloud-dialog"
    [style]="{ width: '26rem', maxWidth: '95vw' }"
  >
    <div class="cloud-dialog-body">
      <label class="text-xxs sm:text-xs">Folder name</label>
      <input
        pInputText
        [(ngModel)]="newFolderName"
        class="w-full text-xxs sm:text-xs"
        placeholder="my-folder"
        (keydown.enter)="createNewFolder()"
      />
    </div>
    <ng-template pTemplate="footer">
      <p-button
        label="Cancel"
        styleClass="p-button-text p-button-sm text-xxs sm:text-xs"
        (click)="showCreateFolderDialog = false"
      ></p-button>
      <p-button
        label="Create"
        icon="pi pi-check"
        styleClass="p-button-sm text-xxs sm:text-xs"
        (click)="createNewFolder()"
      ></p-button>
    </ng-template>
  </p-dialog>

  <p-dialog
    [(visible)]="showRenameFolderDialog"
    [modal]="true"
    [closable]="true"
    [draggable]="false"
    [resizable]="false"
    header="Rename Folder"
    styleClass="cloud-dialog"
    [style]="{ width: '26rem', maxWidth: '95vw' }"
  >
    <div class="cloud-dialog-body">
      <label class="text-xxs sm:text-xs">New folder name</label>
      <input
        pInputText
        [(ngModel)]="renameFolderName"
        class="w-full text-xxs sm:text-xs"
        (keydown.enter)="renameFolder()"
      />
    </div>
    <ng-template pTemplate="footer">
      <p-button
        label="Cancel"
        styleClass="p-button-text p-button-sm text-xxs sm:text-xs"
        (click)="showRenameFolderDialog = false"
      ></p-button>
      <p-button
        label="Rename"
        icon="pi pi-check"
        styleClass="p-button-sm text-xxs sm:text-xs"
        (click)="renameFolder()"
      ></p-button>
    </ng-template>
  </p-dialog>

  <p-dialog
    [(visible)]="showFileEditor"
    (onHide)="closeFileEditor()"
    [modal]="true"
    [closable]="true"
    [draggable]="false"
    [resizable]="false"
    [style]="{ width: '44rem', maxWidth: '96vw' }"
    [header]="editingFile ? 'Edit File' : 'Create New File'"
    styleClass="cloud-dialog"
  >
    <div class="cloud-dialog-body">
      <label class="text-xxs sm:text-xs">File name</label>
      <input
        pInputText
        [(ngModel)]="newFileName"
        class="w-full text-xxs sm:text-xs"
        placeholder="filename.txt"
      />
      <label class="text-xxs sm:text-xs">Content</label>
      <textarea
        [(ngModel)]="fileContent"
        class="cloud-editor text-xxs sm:text-xs"
      ></textarea>
    </div>
    <ng-template pTemplate="footer">
      <p-button
        label="Cancel"
        styleClass="p-button-text p-button-sm text-xxs sm:text-xs"
        (click)="closeFileEditor()"
      ></p-button>
      <p-button
        label="Save"
        icon="pi pi-save"
        styleClass="p-button-sm text-xxs sm:text-xs"
        (click)="saveFile()"
      ></p-button>
    </ng-template>
  </p-dialog>

  <p-dialog
    [(visible)]="showRenameFileDialog"
    [modal]="true"
    [closable]="true"
    [draggable]="false"
    [resizable]="false"
    header="Rename File"
    styleClass="cloud-dialog"
    [style]="{ width: '26rem', maxWidth: '95vw' }"
  >
    <div class="cloud-dialog-body">
      <label class="text-xxs sm:text-xs">New file name</label>
      <input
        pInputText
        [(ngModel)]="renameFileName"
        class="w-full text-xxs sm:text-xs"
        (keydown.enter)="renameFile()"
      />
    </div>
    <ng-template pTemplate="footer">
      <p-button
        label="Cancel"
        styleClass="p-button-text p-button-sm text-xxs sm:text-xs"
        (click)="showRenameFileDialog = false"
      ></p-button>
      <p-button
        label="Rename"
        icon="pi pi-check"
        styleClass="p-button-sm text-xxs sm:text-xs"
        (click)="renameFile()"
      ></p-button>
    </ng-template>
  </p-dialog>
</div>
