<div class="chat-shell fixed top-0 left-0 w-screen h-screen flex flex-col z-50">
  <!-- Header -->
  <div
    class="chat-header px-4 py-3 border-b font-semibold flex justify-between items-center"
  >
    <span class="text-lg sm:text-xl">Chat with {{ username }}</span>
    <div class="flex items-center gap-2 flex-shrink-0">
      <button
        (click)="toggleSearch()"
        class="search-toggle-btn transition-colors p-1"
        [class.is-active]="isSearchOpen"
        aria-label="Toggle search"
        title="Search messages"
      >
        <i class="pi pi-search"></i>
      </button>
      <button
        (click)="onClose()"
        class="close-chat-btn"
        aria-label="Close chat"
      >
        <i class="pi pi-times"></i>
      </button>
    </div>
  </div>
  <!-- Search Bar -->
  <div
    *ngIf="isSearchOpen"
    class="search-bar px-4 py-2 border-b flex items-center gap-2"
  >
    <input
      #searchInput
      type="text"
      class="chat-search-input flex-1 px-3 py-1.5 text-sm rounded-md outline-none"
      [(ngModel)]="searchQuery"
      (ngModelChange)="applySearch()"
      (keydown.enter)="goToNextMatch()"
      name="search"
      autocomplete="off"
      placeholder="Search messages"
    />
    <button
      type="button"
      class="search-nav-btn"
      (click)="goToPreviousMatch()"
      [disabled]="!matchedMessageIndexes.length"
      aria-label="Previous match"
      title="Previous match"
    >
      <i class="pi pi-angle-up"></i>
    </button>
    <button
      type="button"
      class="search-nav-btn"
      (click)="goToNextMatch()"
      [disabled]="!matchedMessageIndexes.length"
      aria-label="Next match"
      title="Next match"
    >
      <i class="pi pi-angle-down"></i>
    </button>
    <span class="chat-search-label text-xs whitespace-nowrap">
      {{ searchMatchLabel }}
    </span>
  </div>
  <!-- Messagebox -->
  <div
    class="chat-message-list flex-1 overflow-y-auto p-4 space-y-2"
    #messageContainer
  >
    <div
      *ngFor="let msg of messages; let i = index"
      class="flex items-end mb-3"
      [ngClass]="{
        'justify-end': msg.senderUsername === currentUsername,
        'justify-start': msg.senderUsername !== currentUsername
      }"
    >
      <div
        *ngIf="msg.senderUsername !== currentUsername"
        class="chat-avatar w-8 h-8 rounded-full text-white flex items-center justify-center font-semibold text-xs select-none flex-shrink-0 mr-2"
        [ngClass]="{ 'overflow-hidden': getAvatarPicUrl(msg.senderUsername) }"
      >
        <ng-container *ngIf="getAvatarPicUrl(msg.senderUsername) as picUrl; else noPicOther">
          <img [src]="picUrl" alt="Profile" class="w-full h-full object-cover block" />
        </ng-container>
        <ng-template #noPicOther>
          {{ getAvatarFallback(msg.senderUsername) }}
        </ng-template>
      </div>

      <div
        #messageBubble
        class="chat-bubble max-w-[75%] px-4 py-2 rounded-xl text-sm break-words"
        [ngClass]="{
          'my-message rounded-br-none': msg.senderUsername === currentUsername,
          'other-message rounded-bl-none':
            msg.senderUsername !== currentUsername,
          'search-match': isMessageMatch(i),
          'search-active-match': isActiveSearchMatch(i),
        }"
      >
        <div>{{ msg.content }}</div>
        <div class="message-time">
          {{ msg.timestamp | date: "shortTime" }}
        </div>
      </div>

      <div
        *ngIf="msg.senderUsername === currentUsername"
        class="chat-avatar w-8 h-8 rounded-full text-white flex items-center justify-center font-semibold text-xs select-none flex-shrink-0 ml-2"
        [ngClass]="{ 'overflow-hidden': getAvatarPicUrl(msg.senderUsername) }"
      >
        <ng-container *ngIf="getAvatarPicUrl(msg.senderUsername) as picUrl; else noPicCurrent">
          <img [src]="picUrl" alt="Profile" class="w-full h-full object-cover block" />
        </ng-container>
        <ng-template #noPicCurrent>
          {{ getAvatarFallback(msg.senderUsername) }}
        </ng-template>
      </div>
    </div>

    <div
      *ngIf="
        isSearchOpen && searchQuery.trim() && matchedMessageIndexes.length === 0
      "
      class="chat-empty-state text-center text-sm pt-8"
    >
      No messages found for '{{ searchQuery }}'
    </div>
  </div>

  <!-- Input-Field -->
  <form (submit)="sendMessage()" class="chat-input-row flex border-t px-4 py-3">
    <input
      type="text"
      [(ngModel)]="newMessage"
      name="message"
      class="chat-input flex-1 px-3 py-2 outline-none border rounded-l-md"
      placeholder="Type a message..."
      autocomplete="off"
    />
    <button
      type="submit"
      class="send-btn px-5 text-white font-bold rounded-r-md transition"
    >
      Send
    </button>
  </form>
</div>
